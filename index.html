<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Admin Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <div class="logo-box">
          <img src="SUNRISE .png" alt="School logo" class="logo" />
        </div>
        <h1>School Admin Portal</h1>
        <p>Register administrators and manage student registration for Nursery classes and Primary One and Two.</p>
      </section>

      <section id="authSection" class="card">
        <div class="tabs">
          <button class="tab active" data-target="loginPanel">Admin Login</button>
          <button class="tab" data-target="registerPanel">Register Admin</button>
        </div>

        <div id="loginPanel" class="panel active">
          <h2>Login</h2>
          <form id="adminLoginForm">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" type="email" required />

            <label for="loginPassword">Password</label>
            <input id="loginPassword" type="password" required />

            <button type="submit">Login</button>
          </form>
          <p class="hint">Demo admin: admin@school.com / admin123</p>
        </div>

        <div id="registerPanel" class="panel">
          <h2>Create Admin Account</h2>
          <form id="adminRegisterForm">
            <label for="regName">Full Name</label>
            <input id="regName" type="text" required />

            <label for="regEmail">Email</label>
            <input id="regEmail" type="email" required />

            <label for="regPassword">Password</label>
            <input id="regPassword" type="password" required />

            <label for="regConfirmPassword">Confirm Password</label>
            <input id="regConfirmPassword" type="password" required />

            <button type="submit">Register</button>
          </form>
        </div>

        <div id="messageBox" class="message" aria-live="polite"></div>
      </section>

      <section id="dashboardSection" class="card hidden">
        <div class="dashboard-header">
          <div>
            <h2>Student Registration Portal</h2>
            <p id="welcomeMessage">Welcome, Admin</p>
          </div>
          <button id="logoutButton" class="secondary">Logout</button>
        </div>

        <form id="studentForm">
          <div class="grid">
            <div>
              <label for="studentName">Student Name</label>
              <input id="studentName" type="text" required />
            </div>
            <div>
              <label for="studentClass">Class</label>
              <select id="studentClass" required>
                <option value="">Select class</option>
                <optgroup label="Nursery">
                  <option>ECD</option>
                  <option>Baby Class</option>
                  <option>Middle Class</option>
                  <option>Top Class</option>
                </optgroup>
                <option>Primary One</option>
                <option>Primary Two</option>
              </select>
            </div>
          </div>

          <div class="grid">
            <div>
              <label for="dob">Date of Birth</label>
              <input id="dob" type="date" required />
            </div>
            <div>
              <label for="gender">Gender</label>
              <select id="gender" required>
                <option value="">Select gender</option>
                <option>Male</option>
                <option>Female</option>
              </select>
            </div>
          </div>

          <div class="grid">
            <div>
              <label for="parentName">Parent/Guardian Name</label>
              <input id="parentName" type="text" required />
            </div>
            <div>
              <label for="parentPhone">Phone Number</label>
              <input id="parentPhone" type="tel" required />
            </div>
          </div>

          <label for="address">Address</label>
          <textarea id="address" rows="3" required></textarea>

          <div class="form-actions">
            <button id="studentSubmitBtn" type="submit">Register Student</button>
            <button id="cancelEditBtn" type="button" class="secondary hidden">Cancel</button>
          </div>
        </form>

        <div class="table-wrap">
          <h3>Registered Students</h3>
          <table>
            <thead>
              <tr>
                  <th>Student</th>
                  <th>Class</th>
                  <th>Parent</th>
                  <th>Phone</th>
                  <th>Actions</th>
                </tr>
            </thead>
            <tbody id="studentTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
